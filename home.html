<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home-page" data-page="home">
  <section id="landingPage" aria-label="Mode screen">
    <nav class="home-nav" aria-label="Navigation">
      <div class="nav-logo">Midnight</div>

      <div class="nav-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
        </svg>
        <input type="search" placeholder="Search..." aria-label="Search" />
      </div>

      <div class="nav-right">
        <button id="profileBtn" class="profile-btn" type="button" aria-label="Profile menu" aria-expanded="false" aria-controls="profileMenu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z"></path>
            <path d="M4.5 20.5c1.5-2.5 4.5-4 7.5-4s6 1.5 7.5 4"></path>
          </svg>
        </button>
        <div id="profileMenu" class="profile-menu" role="menu" aria-label="Profile options">
          <a id="homeProfileLink" class="logout-btn" href="profile.html" role="menuitem">Profile</a>
          <a id="homeCollectionLink" class="logout-btn" href="collection.html" role="menuitem">Collection</a>
          <button id="homeModeMenuBtn" class="logout-btn" type="button" role="menuitem">Writer Mode</button>
          <a id="homeSettingsLink" class="logout-btn" href="settings.html" role="menuitem">Settings</a>
          <a id="adminMenuLink" class="logout-btn hidden" href="admin.html" role="menuitem">Admin Dashboard</a>
          <button id="logoutBtn" class="logout-btn" type="button" role="menuitem">Log Out</button>
        </div>
      </div>
    </nav>

    <main class="mode-screen">
      <button id="readingModeBtn" class="mode-btn active" type="button">CONTINUE AS READER</button>
      <button id="writtingModeBtn" class="mode-btn" type="button">CONTINUE AS WRITER</button>
      <button id="adminDashboardBtn" class="mode-btn hidden" type="button">ADMIN DASHBOARD</button>
    </main>
  </section>
  <script src="app-config.js"></script>
  <script src="app-api.js"></script>
  <script src="script.js"></script>
</body>
</html>
