<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Chapter</title>
  <link rel="stylesheet" href="reader.css" />
</head>
<body class="reader-shell" data-reader-page="chapter">
  <header class="reader-header">
    <a class="brand-link" href="home.html">Midnight</a>

    <form id="globalSearchForm" class="header-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
      </svg>
      <input id="globalSearchInput" type="search" placeholder="Search title or author..." />
    </form>

    <nav class="header-links">
      <a href="explore.html" data-nav="explore">Explore</a>
      <a href="library.html" data-nav="library">Library</a>
    </nav>

    <div class="header-profile">
      <button id="headerProfileBtn" class="icon-btn" type="button" aria-label="Profile menu" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z"></path>
          <path d="M4.5 20.5c1.5-2.5 4.5-4 7.5-4s6 1.5 7.5 4"></path>
        </svg>
      </button>
      <div id="headerProfileMenu" class="profile-menu">
        <span id="headerUserLine" class="menu-user"></span>
        <a id="headerProfileLink" class="menu-item" href="#">Profile</a>
        <button id="headerLogoutBtn" class="menu-item" type="button">Log Out</button>
      </div>
    </div>
  </header>

  <main class="reader-main">
    <section class="hero-card">
      <div class="section-head">
        <div>
          <h1 id="chapterTitle" class="section-title"></h1>
          <p id="chapterMeta" class="section-sub"></p>
        </div>
        <span id="chapterBadge" class="badge"></span>
      </div>

      <div class="cta-row">
        <button id="chapterLikeBtn" class="btn icon-action-btn vote-action-btn" type="button" aria-label="Vote Chapter" aria-pressed="false" data-tooltip="Vote Chapter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20.7 4.8 13.6a4.8 4.8 0 0 1 6.8-6.8l.4.4.4-.4a4.8 4.8 0 1 1 6.8 6.8Z"></path>
          </svg>
          <span class="sr-only">Vote Chapter</span>
        </button>
        <a id="chapterStoryBtn" class="btn" href="#">Back to Story</a>
        <a id="chapterPrevBtn" class="btn" href="#">Previous Chapter</a>
        <a id="chapterNextBtn" class="btn primary" href="#">Next Chapter</a>
      </div>
    </section>

    <article id="chapterBody" class="story-content"></article>

    <section class="comments">
      <div class="section-head">
        <div>
          <h2 class="section-title">Comments</h2>
          <p class="section-sub">Votes and comments stay with this chapter.</p>
        </div>
      </div>
      <div id="chapterCommentsList"></div>

      <div class="comment-box">
        <textarea id="chapterCommentInput" placeholder="Write a comment for this chapter..."></textarea>
        <div class="cta-row">
          <button id="chapterCommentSubmit" class="btn primary" type="button">Add Comment</button>
        </div>
      </div>
    </section>
  </main>

  <script src="reader-data.js"></script>
  <script src="app-config.js"></script>
  <script src="app-api.js"></script>
  <script src="reader.js"></script>
</body>
</html>
