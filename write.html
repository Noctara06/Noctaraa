<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Write Story</title>
  <link rel="stylesheet" href="writer.css" />
</head>
<body class="writer-shell" data-writer-page="editor">
  <header class="writer-header">
    <a class="writer-brand" href="home.html">Midnight</a>
    <nav class="writer-nav">
      <a href="writer.html" data-writer-nav="dashboard">Dashboard</a>
      <a href="writer-stories.html" data-writer-nav="stories">Stories</a>
      <a href="analytics.html" data-writer-nav="analytics">Analytics</a>
      <a href="writer-profile.html" data-writer-nav="profile">Profile</a>
    </nav>
    <div class="writer-actions">
      <a class="reader-link" href="explore.html">Reader Mode</a>
      <div class="menu-wrap">
        <button id="writerMenuBtn" class="icon-btn" type="button" aria-label="Writer menu" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z"></path>
            <path d="M4.5 20.5c1.5-2.5 4.5-4 7.5-4s6 1.5 7.5 4"></path>
          </svg>
        </button>
        <div id="writerMenu" class="profile-menu">
          <span id="writerUserLine" class="menu-user"></span>
          <a class="menu-item" href="writer-profile.html">Writer Profile</a>
          <a class="menu-item" href="notifications.html">Notifications</a>
          <button id="writerLogoutBtn" class="menu-item" type="button">Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="writer-main">
    <section class="section">
        <div class="section-head">
          <div>
            <h1 class="section-title">Write / Editor</h1>
          </div>
        </div>
    </section>

    <section class="editor-layout">
      <article class="card editor-section editor-main-panel">
        <div class="section-head">
          <div>
            <h2 class="section-title editor-step-title">Story Details</h2>
          </div>
        </div>

        <div class="field">
          <label for="editorTitle">Story Title</label>
          <input id="editorTitle" class="input editor-title-input" type="text" placeholder="Story title..." />
        </div>

        <div class="field">
          <label for="editorDescription">Description</label>
          <textarea id="editorDescription" class="textarea editor-description" placeholder="Write a short description for your story..." maxlength="700"></textarea>
        </div>
      </article>

      <aside class="card editor-section editor-side-panel">
        <div class="field">
          <label for="editorCoverInput">Story Poster</label>
          <input id="editorCoverInput" class="input" type="file" accept="image/*" />
          <div id="editorCoverPreview" class="cover-preview editor-cover-preview">Story Poster Preview</div>
        </div>
      </aside>
    </section>

    <section class="editor-secondary">
      <article class="card editor-meta-strip">
        <div class="editor-meta-strip-grid">
          <div class="field">
            <label for="editorTags">Tags</label>
            <input id="editorTags" class="input" type="text" placeholder="magic, romance, mystery" />
          </div>

          <div class="field">
            <label for="editorGenre">Genre</label>
            <select id="editorGenre" class="select">
              <option value="romance">Romance</option>
              <option value="horror">Horror</option>
              <option value="fantasy">Fantasy</option>
              <option value="thriller">Thriller</option>
              <option value="sci-fi">Sci-Fi</option>
            </select>
          </div>
        </div>
      </article>

      <article class="card editor-actions-card">
        <div class="section-head">
          <div>
            <h3 class="section-title" style="font-size:1.05rem;">Story Actions</h3>
            <p class="section-sub">Save drafts, preview your story, or publish when ready.</p>
          </div>
        </div>

        <p id="editorSaveStatus" class="status-text">Status: Ready</p>

        <div class="editor-action-row">
          <button id="saveDraftBtn" class="btn" type="button">Save as Draft</button>
          <button id="updateStoryBtn" class="btn" type="button">Update Story</button>
          <button id="previewToggleBtn" class="btn" type="button">Preview Mode</button>
          <button id="openPublishBtn" class="btn primary" type="button">Publish</button>
        </div>
      </article>

      <article class="card editor-section chapter-manager">
        <div class="section-head chapter-head">
          <div>
            <h2 class="section-title chapter-title">Chapters</h2>
          </div>
        </div>
        <div id="chapterTabs" class="chapter-tabs"></div>
      </article>

      <article class="card">
        <div class="section-head">
          <div>
            <h3 class="section-title" style="font-size:1.05rem;">Reader Preview</h3>
          </div>
        </div>

        <section id="previewPanel" class="preview-panel hidden">
          <div id="previewTitle" style="font-weight:800;"></div>
          <div id="previewMeta" class="section-sub"></div>
          <p id="previewDescription" class="preview-description"></p>
          <article id="previewBody" class="card" style="margin-top:10px; line-height:1.7;"></article>
        </section>
      </article>
    </section>
  </main>

  <div id="publishModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 class="section-title" style="font-size:1.1rem; margin:0;">Publish Story</h3>
        <button id="closePublishModal" class="modal-close" type="button">x</button>
      </div>

      <div class="field">
        <label>Confirm Title</label>
        <div id="publishConfirmTitle" class="card"></div>
      </div>

      <div class="field">
        <label>Cover Preview</label>
        <div id="publishConfirmCover" class="cover-preview" style="min-height:120px;"></div>
      </div>

      <div class="field">
        <label for="publishVisibility">Visibility</label>
        <select id="publishVisibility" class="select">
          <option value="public">Public</option>
          <option value="private">Private (Draft)</option>
        </select>
      </div>

      <div class="field">
        <label for="publishSchedule">Schedule (optional)</label>
        <input id="publishSchedule" class="input" type="datetime-local" />
      </div>

      <div class="field">
        <label><input id="publishWarning" type="checkbox" /> Content warning (18+ / sensitive)</label>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button id="confirmPublishBtn" class="btn primary" type="button">Publish Now</button>
        <button id="publishDraftBtn" class="btn" type="button">Keep as Draft</button>
      </div>

      <p id="publishStatus" class="status-text"></p>

      <div id="publishSuccess" class="success-box hidden">
        <div>Story published successfully.</div>
        <div class="field" style="margin-top:8px;">
          <label for="publishShareLink">Share Link</label>
          <input id="publishShareLink" class="input" type="text" readonly />
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="goAnalyticsBtn" class="btn" type="button">Go to Analytics</button>
          <button id="closePublishSuccessBtn" class="btn" type="button">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script src="app-api.js"></script>
  <script src="writer.js"></script>
</body>
</html>
