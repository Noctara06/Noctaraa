<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Author Profile</title>
  <link rel="stylesheet" href="reader.css" />
</head>
<body class="reader-shell" data-reader-page="profile">
  <header class="reader-header">
    <a class="brand-link" href="home.html">Midnight</a>

    <form id="globalSearchForm" class="header-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
      </svg>
      <input id="globalSearchInput" type="search" placeholder="Search title or author..." />
    </form>

    <nav class="header-links">
      <a href="explore.html" data-nav="explore">Explore</a>
      <a href="library.html" data-nav="library">Library</a>
    </nav>

    <div class="header-profile">
      <button id="headerProfileBtn" class="icon-btn" type="button" aria-label="Profile menu" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z"></path>
          <path d="M4.5 20.5c1.5-2.5 4.5-4 7.5-4s6 1.5 7.5 4"></path>
        </svg>
      </button>
      <div id="headerProfileMenu" class="profile-menu">
        <span id="headerUserLine" class="menu-user"></span>
        <a id="headerProfileLink" class="menu-item" href="#">Profile</a>
        <button id="headerLogoutBtn" class="menu-item" type="button">Log Out</button>
      </div>
    </div>
  </header>

  <main class="reader-main">
    <section class="author-hero">
      <div id="profileCover" class="author-cover-photo" aria-hidden="true"></div>
      <div class="author-hero-body">
        <div id="profileAvatar" class="author-avatar author-avatar-large"></div>
        <div class="author-hero-main">
          <div class="author-hero-head">
            <div class="author-hero-copy">
              <h1 id="profileName" class="section-title"></h1>
              <p id="profileUsername" class="section-sub"></p>
            </div>
            <div class="author-hero-actions">
              <button id="profileEditBtn" class="btn hidden" type="button">Edit Profile</button>
              <a id="profileSettingsBtn" class="btn hidden" href="settings.html">Settings</a>
              <button id="profileFollowBtn" class="btn" type="button">Follow</button>
              <button id="profileNotifyBtn" class="btn icon-action-btn" type="button" aria-label="Get Author Updates" aria-pressed="false" data-tooltip="Get Author Updates">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
                  <path d="M9.5 17a2.5 2.5 0 0 0 5 0"></path>
                </svg>
                <span class="sr-only">Get Author Updates</span>
              </button>
            </div>
          </div>
          <p id="profileBio" class="section-sub author-hero-bio"></p>
          <div class="author-hero-footer">
            <div id="profileStats" class="author-stats"></div>
            <div id="profileSocials" class="author-socials hidden"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="profile-tab-shell">
      <div class="profile-tab-nav" role="tablist" aria-label="Profile sections">
        <button id="profileStoriesTab" class="profile-tab-btn active" type="button" role="tab" aria-selected="true">Stories</button>
        <button id="profileCollectionsTab" class="profile-tab-btn" type="button" role="tab" aria-selected="false">Public Collections</button>
        <button id="profileQuestionsTab" class="profile-tab-btn" type="button" role="tab" aria-selected="false">Ask Author</button>
      </div>
    </section>

    <section id="profileStoriesSection" class="section profile-content-section">
      <div id="profileStories" class="story-grid"></div>
    </section>

    <section id="profileCollectionsSection" class="section profile-content-section hidden">
      <div class="section-head profile-section-head">
        <div>
          <p id="profileCollectionsIntro" class="section-sub">Public reading lists shared on this profile.</p>
        </div>
      </div>
      <div id="profileCollections" class="profile-collection-list"></div>
    </section>

    <section id="profileQuestionsSection" class="section profile-content-section hidden">
      <article class="hero-card profile-question-shell">
        <div class="section-head profile-section-head">
          <div>
            <h2 id="profileQuestionsTitle" class="section-title">Ask Author</h2>
            <p id="profileQuestionsIntro" class="section-sub">Readers can ask the author questions here.</p>
          </div>
        </div>

        <form id="profileQuestionForm" class="profile-question-form hidden">
          <textarea id="profileQuestionInput" class="profile-question-input" placeholder="Ask something about the stories, writing, or updates..." maxlength="600"></textarea>
          <div class="profile-question-actions">
            <button id="profileQuestionSubmitBtn" class="btn primary" type="submit">Post Question</button>
          </div>
        </form>

        <p id="profileQuestionStatus" class="section-sub profile-question-status hidden"></p>
        <div id="profileQuestionList" class="profile-question-list"></div>
      </article>
    </section>
  </main>

  <div id="profileFollowersModal" class="profile-followers-modal hidden" role="dialog" aria-modal="true" aria-labelledby="profileFollowersModalTitle">
    <div class="profile-followers-dialog">
      <div class="profile-followers-dialog-head">
        <div>
          <h2 id="profileFollowersModalTitle" class="section-title">Followers</h2>
          <p id="profileFollowersModalCount" class="section-sub"></p>
        </div>
        <button id="profileFollowersModalClose" class="icon-btn" type="button" aria-label="Close followers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <div id="profileFollowersModalList" class="profile-followers-list"></div>
    </div>
  </div>

  <script src="reader-data.js"></script>
  <script src="app-config.js"></script>
  <script src="app-api.js"></script>
  <script src="reader.js"></script>
</body>
</html>
