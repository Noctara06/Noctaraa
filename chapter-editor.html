<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Chapter Editor</title>
  <link rel="stylesheet" href="writer.css" />
</head>
<body class="writer-shell" data-writer-page="chapter-editor">
  <header class="writer-header">
    <a class="writer-brand" href="home.html">Midnight</a>
    <nav class="writer-nav">
      <a href="writer.html" data-writer-nav="dashboard">Dashboard</a>
      <a href="writer-stories.html" data-writer-nav="stories">Stories</a>
      <a href="analytics.html" data-writer-nav="analytics">Analytics</a>
      <a href="writer-profile.html" data-writer-nav="profile">Profile</a>
    </nav>
    <div class="writer-actions">
      <a class="reader-link" href="explore.html">Reader Mode</a>
      <div class="menu-wrap">
        <button id="writerMenuBtn" class="icon-btn" type="button" aria-label="Writer menu" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z"></path>
            <path d="M4.5 20.5c1.5-2.5 4.5-4 7.5-4s6 1.5 7.5 4"></path>
          </svg>
        </button>
        <div id="writerMenu" class="profile-menu">
          <span id="writerUserLine" class="menu-user"></span>
          <a class="menu-item" href="writer-profile.html">Writer Profile</a>
          <a class="menu-item" href="notifications.html">Notifications</a>
          <button id="writerLogoutBtn" class="menu-item" type="button">Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="writer-main">
    <section class="section">
      <div class="section-head">
        <div>
          <h1 id="chapterEditorStoryTitle" class="section-title">Chapter Editor</h1>
          <p id="chapterEditorMeta" class="section-sub"></p>
        </div>
        <a id="chapterBackToStoryBtn" class="btn" href="write.html">Back to Story</a>
      </div>
    </section>

    <section class="section">
      <article class="card">
        <div class="field">
          <label for="chapterEditorTitle">Chapter Title</label>
          <input id="chapterEditorTitle" class="input" type="text" placeholder="Chapter title..." />
        </div>

        <div class="toolbar">
          <button class="btn small" type="button" data-editor-cmd="bold">Bold</button>
          <button class="btn small" type="button" data-editor-cmd="italic">Italic</button>
          <button class="btn small" type="button" data-editor-cmd="h2">H2</button>
          <button class="btn small" type="button" data-editor-cmd="justifyLeft">Left</button>
          <button class="btn small" type="button" data-editor-cmd="justifyCenter">Center</button>
          <button class="btn small" type="button" data-editor-cmd="justifyRight">Right</button>
        </div>

        <div id="editorContent" class="rich-editor" contenteditable="true"></div>

        <div class="editor-status">
          <span id="chapterEditorWordCount">Words: 0</span>
          <span id="chapterEditorReadingTime">Reading time: 0 min</span>
          <span id="chapterEditorSaveStatus">Status: Ready</span>
        </div>

        <div style="margin-top: 12px; display:flex; gap:8px; flex-wrap:wrap;">
          <button id="chapterEditorSaveBtn" class="btn primary" type="button">Save Chapter</button>
          <button id="chapterEditorCloseBtn" class="btn" type="button">Save & Close Tab</button>
        </div>
      </article>
    </section>
  </main>

  <script src="app-config.js"></script>
  <script src="app-api.js"></script>
  <script src="writer.js"></script>
</body>
</html>
